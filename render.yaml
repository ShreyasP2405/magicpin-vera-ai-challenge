services:
  - type: web
    name: vera-contextmax
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn bot:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /v1/healthz
    autoDeployTrigger: commit
    numInstances: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: TEAM_NAME
        value: Vera Context
      - key: TEAM_MEMBERS
        value: Shreyas
      - key: CONTACT_EMAIL
        sync: false
      - key: SUBMITTED_AT
        sync: false
